# ============================================
# APPLICATION
# ============================================
spring.application.name=hotel-management
server.port=8080

# ============================================
# POSTGRESQL — reads from environment variables
# with fallback values for local dev
# ============================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hotel_management}
spring.datasource.username=${DB_USER:hotel_user}
spring.datasource.password=${DB_PASSWORD:hotel_pass_2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# ============================================
# FLYWAY
# ============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================
# JWT
# ============================================
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGtleSBmb3IgaG90ZWwgbWFuYWdlbWVudCBzeXN0ZW0gYW5kIGl0IGlzIDI1NiBiaXRzIGxvbmc=
app.jwt.expiration-ms=86400000

# ============================================
# WEBSOCKET
# ============================================
spring.websocket.max-text-message-size=8192
spring.websocket.max-binary-message-size=8192

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# LOGGING
# ============================================
logging.level.com.hotel.management=INFO
logging.level.org.hibernate.SQL=WARN

# ============================================
# SPRINGDOC
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# MAIL (future use)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true