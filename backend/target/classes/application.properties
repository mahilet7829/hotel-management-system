# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=hotel-management
server.port=8080

# ============================================
# POSTGRESQL DATASOURCE
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/hotel_management
spring.datasource.username=postgres
spring.datasource.password=mahletarsemabff
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# ============================================
# FLYWAY
# ============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================
# JWT CONFIGURATION
# ============================================
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGtleSBmb3IgaG90ZWwgbWFuYWdlbWVudCBzeXN0ZW0gYW5kIGl0IGlzIDI1NiBiaXRzIGxvbmc=
app.jwt.expiration-ms=86400000

# ============================================
# WEBSOCKET CONFIGURATION
# ============================================
spring.websocket.max-text-message-size=8192
spring.websocket.max-binary-message-size=8192

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# LOGGING
# ============================================
logging.level.com.hotel.management=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=INFO

# ============================================
# MAIL CONFIGURATION (For future use)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# SPRINGDOC OPENAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html